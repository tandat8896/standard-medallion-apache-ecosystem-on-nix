name: Test PostgreSQL Load

on:
  pull_request:
    paths:
      - 'scripts/spark_gold_to_postgres_*.py'
      - 'ETL/infrastructure/postgres-schemas/**'

jobs:
  test-load:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v26
      - uses: cachix/cachix-action@v14
        with:
          name: tandat-etl
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Apply schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE etl_analytics;"
          PGPASSWORD=postgres psql -h localhost -U postgres -d etl_analytics -f ETL/infrastructure/postgres-schemas/create_gold_tables.sql

      - name: Verify tables
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d etl_analytics -c "\dt" | grep kpi_

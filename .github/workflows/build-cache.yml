name: Build and Cache

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'flake.nix'

jobs:
  build-cicd-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v14
        with:
          name: tandat-etl
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          pushFilter: '(-source$|nixpkgs\.tar\.gz$)'

      - name: Debug - Check Cachix config
        run: |
          echo "=== Cachix Configuration ==="
          cat ~/.config/cachix/cachix.dhall || echo "No config found"
          echo "=== Cache URL ==="
          echo "https://tandat-etl.cachix.org"

      - name: Build and push to Cachix
        run: nix build .#devShells.x86_64-linux.default --accept-flake-config --impure
